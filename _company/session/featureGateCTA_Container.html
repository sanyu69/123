<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feature Gate CTA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="feature-gate-container">
        <!-- IAP 티어 선택 영역 -->
        <div class="iap-tiers">
            <div class="tier basic-tier">
                <h3>Basic (₩29.99)</h3>
                <p>기본 기능 접근</p>
                <button class="cta-btn unlock-pro" data-tier="pro">Pro로 업그레이드</button>
            </div>
            <div class="tier pro-tier">
                <h3>Pro (₩49.99)</h3>
                <p>고급 기능 접근</p>
                <button class="cta-btn unlock-vip" data-tier="vip">VIP로 업그레이드</button>
            </div>
        </div>

        <!-- 시스템 상태 표시 영역 -->
        <div class="system-status">
            <div class="status-indicator" id="stability-status">시스템 안정성: 준비 완료</div>
            <div class="error-message" id="error-message"></div>
        </div>
    </div>

</body>
</html>
